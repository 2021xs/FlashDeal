# ECS 部署参考配置。
# 当前推荐使用 start-app.sh 通过命令行参数覆盖连接信息；
# 如果需要改为配置文件方式，可将本文件放到 jar 同级 config/application-ecs.yaml，
# 并把启动参数调整为 --spring.profiles.active=ecs。

server:
  port: 8081

spring:
  application:
    name: flash-deal
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
  redis:
    host: 127.0.0.1
    port: 6379
    password: ""
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3

mybatis-plus:
  type-aliases-package: com.flashdeal.entity

local-cache:
  shop:
    enabled: true

order:
  timeout:
    seconds: 30

seckill:
  order:
    mode: async

logging:
  level:
    com.flashdeal: info
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS

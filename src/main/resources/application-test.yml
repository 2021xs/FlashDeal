spring:
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/flashdeal?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password: ""
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        auto-startup: false

order:
  timeout:
    seconds: 30

outbox:
  order-timeout:
    enabled: false
  redis-stock-recovery:
    enabled: false

order-timeout:
  close-retry:
    enabled: false

seckill:
  stock-sync:
    enabled: false
  mq-message:
    retry:
      enabled: false
  reconcile:
    enabled: false
  redis-reconcile:
    enabled: false

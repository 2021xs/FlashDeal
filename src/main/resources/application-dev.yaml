server:
  port: 8081

spring:
  application:
    name: flash-deal
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: 127.0.0.1
    port: 6379
    password: ""
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 100
        retry:
          enabled: true
          max-attempts: 3

mybatis-plus:
  type-aliases-package: com.flashdeal.entity

local-cache:
  shop:
    enabled: true

order:
  timeout:
    seconds: 30
outbox:
  order-timeout:
    enabled: true
    publish-interval-seconds: 5
    batch-size: 100
    max-retry-count: 5
    sending-timeout-seconds: 60
    retry-base-delay-seconds: 10
    retry-max-delay-seconds: 300
    confirm-timeout-seconds: 5
  redis-stock-recovery:
    enabled: true
    publish-interval-seconds: 10
    batch-size: 100
    max-retry-count: 10
    sending-timeout-seconds: 60
    retry-delay-seconds: 60
order-timeout:
  close-dlq:
    max-fail-count: 5
  close-retry:
    enabled: true
    fixed-delay-seconds: 60
    batch-size: 100
    base-delay-seconds: 60
    max-delay-seconds: 3600
    processing-timeout-seconds: 300

seckill:
  stock-sync:
    enabled: true
    force: false
  mq-message:
    max-retry-count: 3
    initial-next-retry-delay-seconds: 30
    confirm-failed-next-retry-delay-seconds: 30
    returned-next-retry-delay-seconds: 30
    retry:
      enabled: true
    retry-interval-seconds: 30
    retry-batch-size: 50
    sent-timeout-seconds: 300
  reconcile:
    enabled: true
    fixed-delay-seconds: 60
    batch-size: 100
    alert-suppress-seconds: 1800
  redis-reconcile:
    enabled: true
    fixed-delay-seconds: 60
    batch-size: 100
    pending-timeout-seconds: 300
    processing-timeout-seconds: 600
  order:
    batch-consume:
      batch-size: 100
      receive-timeout-ms: 100
      prefetch: 100
      concurrency: 1
      max-concurrency: 1
      retry-times: 2

logging:
  level:
    com.flashdeal: debug
  pattern:
    dateformat: mm:ss.SSS
